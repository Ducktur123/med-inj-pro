<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live BME Sensor | Dolphin Medical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#F8FAFC]">

    <nav class="bg-white border-b py-6 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="text-xl font-extrabold tracking-tighter italic text-blue-600">DOLPHIN SENSOR</div>
        <a href="index.html" class="text-sm font-bold text-slate-500 hover:text-blue-600 transition">← Back to Store</a>
    </nav>

    <header class="py-16 px-6 text-center">
        <div class="max-w-3xl mx-auto">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-green-50 text-green-600 text-xs font-black mb-4">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                LIVE GLOBAL MONITOR ACTIVE
            </div>
            <h1 class="text-5xl font-extrabold text-slate-900 mb-6 tracking-tight">Autonomous BME Feed</h1>
            <p class="text-slate-600">Scanning global news and university databases for 2026/2027 funding opportunities.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-12 px-6">
        <div id="scholarship-feed" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-600 mb-4"></div>
                <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Calibrating Sensors...</p>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '0e7b181f74834ae98c4c1c8c8ec447bc';
        const SEARCH_QUERY = 'Biomedical Engineering Scholarship 2026';

        async function startSensor() {
            const feedContainer = document.getElementById('scholarship-feed');
            
            try {
                // The Drone (API) flying out to get data
                const response = await fetch(`https://newsapi.org/v2/everything?q=${encodeURIComponent(SEARCH_QUERY)}&sortBy=publishedAt&apiKey=${API_KEY}`);
                const data = await response.json();

                if (data.articles && data.articles.length > 0) {
                    feedContainer.innerHTML = ''; // Clear loading state
                    
                    data.articles.slice(0, 10).forEach(article => {
                        const date = new Date(article.publishedAt).toLocaleDateString();
                        feedContainer.innerHTML += `
                            <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm hover:shadow-xl transition-all border-t-4 border-blue-600 group">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[10px] font-black uppercase text-blue-600 bg-blue-50 px-3 py-1 rounded-full">Detected Update</span>
                                    <span class="text-slate-300 text-[10px] font-bold">${date}</span>
                                </div>
                                <h3 class="text-xl font-bold mb-3 text-slate-900 line-clamp-2">${article.title}</h3>
                                <p class="text-slate-500 text-sm mb-6 line-clamp-3">${article.description || 'New funding opportunity detected in the BME sector. Click to verify requirements.'}</p>
                                <a href="${article.url}" target="_blank" class="text-blue-600 font-bold text-sm flex items-center gap-1 group-hover:gap-3 transition-all">
                                    Open Official Portal <span>→</span>
                                </a>
                            </div>
                        `;
                    });
                } else {
                    feedContainer.innerHTML = '<p class="col-span-full text-center text-slate-400 font-bold">No new updates in the last 24 hours. Sensors on standby.</p>';
                }
            } catch (error) {
                feedContainer.innerHTML = '<p class="col-span-full text-center text-red-400 font-bold">Sensor Error: Unable to reach global database.</p>';
            }
        }

        window.onload = startSensor;
    </script>
</body>
</html>
