<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BME Quad-Sensor | Dolphin Industrial Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dolphin-blue: #0077be; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .intel-card { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .intel-card:hover { border-left-color: var(--dolphin-blue); background: white; transform: translateX(10px); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-16 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-[900] tracking-tighter text-[#001f3f]">Global <span class="text-blue-600">Field Sensor.</span></h1>
                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mt-2">March 2026 Real-Time Monitoring</p>
            </div>
            <a href="index.html" class="bg-[#001f3f] text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest">Return to Market</a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">
            <button onclick="monitor('Biomedical Engineering Scholarships')" class="glass p-6 rounded-3xl text-center hover:bg-blue-600 hover:text-white transition group">
                <span class="block text-2xl mb-2">🎓</span>
                <span class="text-[10px] font-black uppercase tracking-widest">Scholarships</span>
            </button>
            <button onclick="monitor('Biomedical Engineering Internships 2026')" class="glass p-6 rounded-3xl text-center hover:bg-blue-600 hover:text-white transition group">
                <span class="block text-2xl mb-2">💼</span>
                <span class="text-[10px] font-black uppercase tracking-widest">Internships</span>
            </button>
            <button onclick="monitor('Biomedical Engineering Events Nigeria')" class="glass p-6 rounded-3xl text-center hover:bg-blue-600 hover:text-white transition group">
                <span class="block text-2xl mb-2">🇳🇬</span>
                <span class="text-[10px] font-black uppercase tracking-widest">Nigeria Events</span>
            </button>
            <button onclick="monitor('Biomedical Research Publications')" class="glass p-6 rounded-3xl text-center hover:bg-blue-600 hover:text-white transition group">
                <span class="block text-2xl mb-2">📄</span>
                <span class="text-[10px] font-black uppercase tracking-widest">Publications</span>
            </button>
        </div>

        <div id="intel-feed" class="space-y-4">
            </div>
    </div>

    <script>
        const API_KEY = '0e7b181f74834ae98c4c1c8c8ec447bc';

        async function monitor(query) {
            const feed = document.getElementById('intel-feed');
            feed.innerHTML = '<p class="text-center font-black uppercase text-xs text-slate-400 py-20 tracking-widest animate-pulse">Syncing with Global Nodes...</p>';
            
            try {
                const response = await fetch(`https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&sortBy=publishedAt&apiKey=${API_KEY}`);
                const data = await response.json();
                
                feed.innerHTML = '';
                data.articles.slice(0, 15).forEach(item => {
                    feed.innerHTML += `
                        <div class="glass p-8 rounded-[32px] intel-card flex justify-between items-center group">
                            <div class="max-w-3xl">
                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-2 block">${item.source.name}</span>
                                <h3 class="text-xl font-extrabold text-[#001f3f] mb-2 leading-tight">${item.title}</h3>
                                <p class="text-sm text-slate-500 font-medium line-clamp-1 italic">${item.description || 'Internal technical documentation accessible via full node.'}</p>
                            </div>
                            <a href="${item.url}" target="_blank" class="h-14 w-14 bg-[#001f3f] text-white rounded-2xl flex items-center justify-center font-black text-xl hover:bg-blue-600 transition">→</a>
                        </div>`;
                });
            } catch (e) {
                feed.innerHTML = '<p class="text-red-500 font-black uppercase text-xs text-center">Sensor Node Timeout.</p>';
            }
        }

        window.onload = () => monitor('Biomedical Engineering Global');
    </script>
</body>
</html>
