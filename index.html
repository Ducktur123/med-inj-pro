<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolphin Medical | Sovereign 100 Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dolphin-blue: #0077be; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .sea-gradient { background: linear-gradient(135deg, #0077be 0%, #00aaff 100%); }
        .sidebar-link:hover { background: #f0f7ff; color: #0077be; padding-left: 1.5rem; transition: all 0.3s ease; }
    </style>
</head>
<body class="text-[#001f3f]">

    <nav class="bg-white border-b sticky top-0 z-[100] px-6 py-4 shadow-sm">
        <div class="max-w-[1600px] mx-auto flex items-center justify-between gap-12">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 sea-gradient rounded-xl flex items-center justify-center text-white text-xl font-black shadow-lg">D</div>
                <span class="text-xl font-[900] tracking-tighter uppercase">Dolphin<span class="text-blue-500">Medical</span></span>
            </div>
            
            <div class="flex-1 max-w-3xl hidden md:flex border-2 border-slate-100 rounded-2xl overflow-hidden">
                <input type="text" id="mainSearch" placeholder="Search 100+ Professional Medical Assets..." class="w-full px-6 py-3 outline-none text-sm font-medium">
                <button class="sea-gradient text-white px-10 font-bold text-xs uppercase tracking-widest">Search</button>
            </div>

            <div class="flex items-center gap-8">
                <a href="scholarships.html" class="text-xs font-black uppercase text-slate-400 hover:text-blue-600">Intelligence</a>
                <a href="dashboard.html" class="text-xs font-black uppercase text-slate-400 hover:text-blue-600">Admin</a>
                <button id="connect-wallet" class="sea-gradient text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-blue-200">Connect Wallet</button>
            </div>
        </div>
    </nav>

    <div class="max-w-[1600px] mx-auto px-6 py-8 grid grid-cols-12 gap-8">
        
        <aside class="col-span-12 md:col-span-2">
            <div class="glass rounded-[32px] p-6 sticky top-28">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Departments</h3>
                <ul class="space-y-1">
                    <li><button onclick="renderInventory('Imaging')" class="sidebar-link w-full text-left flex items-center gap-3 py-3 px-4 rounded-xl text-xs font-bold text-slate-600">☢️ Imaging</button></li>
                    <li><button onclick="renderInventory('ICU')" class="sidebar-link w-full text-left flex items-center gap-3 py-3 px-4 rounded-xl text-xs font-bold text-slate-600">🏥 ICU Gear</button></li>
                    <li><button onclick="renderInventory('Lab')" class="sidebar-link w-full text-left flex items-center gap-3 py-3 px-4 rounded-xl text-xs font-bold text-slate-600">🧪 BME Lab</button></li>
                    <li><button onclick="renderInventory('Parts')" class="sidebar-link w-full text-left flex items-center gap-3 py-3 px-4 rounded-xl text-xs font-bold text-slate-600">🔧 Spare Parts</button></li>
                    <li><button onclick="renderInventory('Consumables')" class="sidebar-link w-full text-left flex items-center gap-3 py-3 px-4 rounded-xl text-xs font-bold text-slate-600">🧤 Consumables</button></li>
                </ul>
            </div>
        </aside>

        <main class="col-span-12 md:col-span-10">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 id="cat-title" class="text-3xl font-[900] tracking-tight uppercase">Master Inventory</h2>
                    <p class="text-slate-400 font-bold text-xs uppercase mt-1">Verified Medical Hardware & Components</p>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-black text-blue-500 uppercase">Settlement: NGN / INJ</span>
                </div>
            </div>

            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </main>
    </div>

    <script>
        const USD_NGN = 1685;
        
        // COMPREHENSIVE 100-ITEM DATABASE MOCKUP
        const baseItems = [
            { name: "MRI Cold Head", cat: "Parts", model: "Sumitomo F-50", usd: 7500, img: "https://images.unsplash.com/photo-1516549655169-df83a0774514?q=80&w=400" },
            { name: "Patient Monitor", cat: "ICU", model: "Mindray ePM 12", usd: 850, img: "https://images.unsplash.com/photo-1551076805-e1869033e561?q=80&w=400" },
            { name: "Ultrasound Probe", cat: "Imaging", model: "Toshiba C1-5", usd: 1150, img: "https://images.unsplash.com/photo-1584017947486-62e0d183d81e?q=80&w=400" },
            { name: "Lab Centrifuge", cat: "Lab", model: "Hettich EBA 200", usd: 920, img: "https://images.unsplash.com/photo-1579154273821-ad3c14fd78f9?q=80&w=400" }
        ];

        // Generator for 100 unique entries
        const fullInventory = [];
        for(let i=1; i<=100; i++) {
            const template = baseItems[i % baseItems.length];
            fullInventory.push({
                id: i,
                name: `${template.name} V-${i+200}`,
                cat: template.cat,
                model: `${template.model}`,
                usd: template.usd + (i * 10),
                img: template.img
            });
        }

        function renderInventory(filter = 'all') {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? fullInventory : fullInventory.filter(x => x.cat === filter);
            
            filtered.forEach(p => {
                const naira = (p.usd * USD_NGN).toLocaleString();
                grid.innerHTML += `
                    <div class="bg-white rounded-[32px] p-5 shadow-sm hover:shadow-xl transition-all border border-slate-50 group">
                        <div class="h-48 rounded-2xl overflow-hidden mb-6 bg-slate-100">
                            <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        </div>
                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">${p.cat}</p>
                        <h4 class="text-sm font-black text-[#001f3f] mb-4 h-10 line-clamp-2">${p.name}</h4>
                        <div class="flex justify-between items-center border-t pt-4">
                            <p class="text-lg font-black tracking-tighter">₦${naira}</p>
                            <button onclick="payWithPaystack(${p.usd * USD_NGN})" class="sea-gradient h-10 w-10 rounded-xl text-white font-bold flex items-center justify-center shadow-lg">+</button>
                        </div>
                    </div>`;
            });
        }

        window.onload = () => renderInventory('all');
    </script>
</body>
    </html>
