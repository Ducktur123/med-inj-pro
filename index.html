<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolphin Medical | Sovereign Infrastructure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dolphin-blue: #0077be; --deep-sea: #001f3f; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; overflow-x: hidden; }
        
        /* 3D Glassmorphism Effect */
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 20px 40px rgba(0, 119, 190, 0.1); 
        }
        
        /* Floating Animation */
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .sea-gradient { background: linear-gradient(135deg, #0077be 0%, #00aaff 100%); }
        .product-card:hover { transform: scale(1.03) translateY(-10px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <div class="fixed -top-24 -left-24 w-96 h-96 bg-blue-200 rounded-full blur-[120px] opacity-40 z-0"></div>
    <div class="fixed top-1/2 -right-24 w-80 h-80 bg-cyan-200 rounded-full blur-[100px] opacity-30 z-0"></div>

    <nav class="sticky top-0 z-[100] px-6 py-4">
        <div class="max-w-7xl mx-auto glass rounded-2xl p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-12 w-12 sea-gradient rounded-xl flex items-center justify-center text-white text-2xl font-black italic shadow-lg shadow-blue-300">D</div>
                <div>
                    <span class="text-xl font-[900] tracking-tighter text-[#001f3f] block leading-none">DOLPHIN</span>
                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest leading-none">Industrial Zone</span>
                </div>
            </div>

            <div class="hidden md:flex gap-8 text-sm font-bold text-slate-600">
                <a href="#" class="hover:text-blue-600 transition">Marketplace</a>
                <a href="scholarships.html" class="hover:text-blue-600 transition">Field Sensor</a>
                <a href="dashboard.html" class="hover:text-blue-600 transition">Dashboard</a>
            </div>

            <button id="connect-wallet" class="sea-gradient text-white px-6 py-3 rounded-xl font-bold text-xs shadow-lg shadow-blue-200 hover:scale-105 transition-all">
                Connect Wallet
            </button>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto px-6 pt-20 pb-12 relative z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <div class="animate-in fade-in slide-in-from-left duration-1000">
                <h1 class="text-6xl md:text-7xl font-[900] text-[#001f3f] leading-[0.9] mb-6">
                    Future-Ready <br> <span class="text-blue-600">Medical Logistics.</span>
                </h1>
                <p class="text-lg text-slate-500 mb-8 font-medium max-w-md">
                    Nigeria's premium hub for imaging parts and BME infrastructure. Calibrated for 2026.
                </p>
                <div class="flex gap-4">
                    <button class="bg-[#001f3f] text-white px-8 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Explore Zone</button>
                    <div class="flex items-center gap-2 text-blue-600 font-bold text-xs px-4">
                        <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span> INJECTIVE ACTIVE
                    </div>
                </div>
            </div>
            <div class="floating hidden md:block">
                <div class="w-full h-[450px] sea-gradient rounded-[60px] shadow-2xl overflow-hidden flex items-center justify-center border-8 border-white">
                    <span class="text-white text-9xl font-black italic opacity-20">DOLPHIN</span>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex gap-4 overflow-x-auto pb-6 scrollbar-hide">
            <div class="flex-shrink-0 bg-white px-8 py-4 rounded-2xl shadow-sm border border-slate-100 font-black text-[10px] uppercase tracking-widest text-blue-600 cursor-pointer hover:bg-blue-600 hover:text-white transition">☢️ Imaging</div>
            <div class="flex-shrink-0 bg-white px-8 py-4 rounded-2xl shadow-sm border border-slate-100 font-black text-[10px] uppercase tracking-widest text-slate-400 cursor-pointer">🏥 ICU Gear</div>
            <div class="flex-shrink-0 bg-white px-8 py-4 rounded-2xl shadow-sm border border-slate-100 font-black text-[10px] uppercase tracking-widest text-slate-400 cursor-pointer">🧪 BME Lab</div>
            <div class="flex-shrink-0 bg-white px-8 py-4 rounded-2xl shadow-sm border border-slate-100 font-black text-[10px] uppercase tracking-widest text-slate-400 cursor-pointer">🔧 Spare Parts</div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-2xl font-black text-[#001f3f] mb-8 uppercase tracking-tighter">Live Inventory</h2>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </section>

    <script>
        const USD_NGN = 1685;
        const products = [
            { name: "MRI Cold Head (GE/Siemens)", usd: 7500, cat: "Imaging Parts" },
            { name: "Toshiba Ultrasound Probe", usd: 1100, cat: "Imaging Parts" },
            { name: "Mindray Patient Monitor", usd: 850, cat: "Theatre/ICU" },
            { name: "Rigol Digital Oscilloscope", usd: 580, cat: "BME Lab" },
            { name: "Nitrile Gloves (Bulk)", usd: 185, cat: "Consumables" }
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                const naira = (p.usd * USD_NGN).toLocaleString();
                grid.innerHTML += `
                    <div class="product-card glass p-8 rounded-[40px] relative overflow-hidden cursor-pointer group">
                        <div class="h-2 w-full sea-gradient absolute top-0 left-0 opacity-0 group-hover:opacity-100 transition"></div>
                        <p class="text-[9px] font-black text-blue-500 uppercase mb-4 tracking-widest">${p.cat}</p>
                        <h4 class="text-xl font-extrabold text-[#001f3f] mb-2 leading-tight">${p.name}</h4>
                        <p class="text-3xl font-[900] text-slate-900 mb-8">₦${naira}</p>
                        <div class="flex gap-2">
                            <button onclick="payWithPaystack(${p.usd * USD_NGN})" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold text-xs hover:bg-[#001f3f] transition uppercase tracking-widest">Naira Pay</button>
                            <button class="w-16 h-14 border border-blue-200 rounded-2xl flex items-center justify-center text-lg grayscale hover:grayscale-0 transition">💎</button>
                        </div>
                    </div>`;
            });
        }

        function payWithPaystack(amount) {
            let handler = PaystackPop.setup({
                key: 'YOUR_PUBLIC_KEY', // Put your Paystack key here
                email: 'customer@email.com',
                amount: amount * 100, // Amount in kobo
                currency: 'NGN',
                callback: function(response) {
                    alert('Transaction Successful! ID: ' + response.reference);
                }
            });
            handler.openIframe();
        }

        // Mobile Wallet Logic
        document.getElementById('connect-wallet').addEventListener('click', async () => {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connect-wallet').innerText = "✅ ONLINE";
            } else {
                window.open("https://metamask.app.link/dapp/" + window.location.host);
            }
        });

        window.onload = renderProducts;
    </script>
</body>
    </html>
