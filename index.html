<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolphin Medical | Institutional Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }</style>
</head>
<body class="bg-[#F8FAFC]">

    <div class="bg-[#182E4B] text-white text-[10px] py-2 px-8 flex justify-between font-black tracking-widest uppercase sticky top-0 z-[100]">
        <div class="flex gap-4 items-center">
            <span class="flex items-center gap-1"><span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span> INJECTIVE MAINNET</span>
            <span class="text-slate-400 border-l border-slate-700 pl-4">Architect: Samuel Oluwadiya</span>
        </div>
        <div class="flex gap-6">
            <span>USD/NGN: <span class="text-blue-400">1,685.00</span></span>
            <span>INJ/USD: <span class="text-blue-400">2.98</span></span>
        </div>
    </div>

    <nav class="bg-white/90 backdrop-blur-md border-b py-6 px-8 flex justify-between items-center sticky top-8 z-50">
        <div class="text-2xl font-[900] tracking-tighter italic text-slate-900">DOLPHIN<span class="text-blue-600">MED</span></div>
        <div class="flex items-center gap-8">
            <a href="scholarships.html" class="text-sm font-bold text-slate-500 hover:text-blue-600">Scholarships</a>
            <a href="dashboard.html" class="text-sm font-bold text-slate-500 hover:text-blue-600">Dashboard</a>
            <button id="connect-wallet" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 hover:bg-blue-700 transition">
                <span id="wallet-icon">🔌</span> <span id="wallet-text">Connect Wallet</span>
            </button>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto py-20 px-6">
        <h2 class="text-4xl font-black mb-12 tracking-tight">INSTITUTIONAL CATALOG</h2>
        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </section>

    <script>
        const USD_NGN = 1685; 
        const INJ_USD = 2.98;

        const masterCatalog = [
            { name: "MRI Cold Head (GE/Siemens)", cat: "Imaging Parts", usd: 7500 },
            { name: "Toshiba Ultrasound Probe", cat: "Imaging Parts", usd: 1100 },
            { name: "Mindray Patient Monitor", cat: "Theatre/ICU", usd: 850 },
            { name: "Rigol Digital Oscilloscope", cat: "BME Lab", usd: 550 },
            { name: "Nitrile Gloves (Carton)", cat: "Consumables", usd: 185 },
            { name: "X-Ray Tube (High Heat)", cat: "Imaging Parts", usd: 4200 }
        ];

        function renderMarket() {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            masterCatalog.forEach(item => {
                const naira = (item.usd * USD_NGN).toLocaleString();
                const inj = (item.usd / INJ_USD).toFixed(2);
                grid.innerHTML += `
                    <div class="bg-white p-8 rounded-[32px] border border-slate-100 hover:shadow-2xl transition-all group">
                        <span class="text-[10px] font-black uppercase text-blue-600 bg-blue-50 px-3 py-1 rounded-full">${item.cat}</span>
                        <h3 class="text-xl font-extrabold mt-4 mb-2">${item.name}</h3>
                        <p class="text-slate-400 text-xs font-bold mb-6">REF: ₦${naira}</p>
                        <div class="pt-6 border-t flex justify-between items-center">
                            <div><p class="text-2xl font-black">${inj} <span class="text-sm">INJ</span></p></div>
                            <button class="bg-slate-900 text-white h-12 w-12 rounded-xl hover:bg-blue-600 transition">🛒</button>
                        </div>
                    </div>`;
            });
        }

        // WALLET LOGIC
        document.getElementById('connect-wallet').addEventListener('click', async () => {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('wallet-text').innerText = accounts[0].substring(0, 6) + '...';
                document.getElementById('connect-wallet').classList.replace('bg-blue-600', 'bg-green-500');
            }
        });

        window.onload = renderMarket;
    </script>
</body>
</html>
